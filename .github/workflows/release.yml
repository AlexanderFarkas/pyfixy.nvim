name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pyfixy-lsp dist/pyfixy-lsp
          tar -C dist -czf pyfixy-lsp-${{ matrix.target }}.tar.gz pyfixy-lsp
      - uses: actions/upload-artifact@v4
        with:
          name: pyfixy-lsp-${{ matrix.target }}
          path: pyfixy-lsp-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pyfixy-lsp-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: pyfixy-lsp-*.tar.gz
